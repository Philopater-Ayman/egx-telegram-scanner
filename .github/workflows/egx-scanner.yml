name: EGX Telegram Scanner

on:
  workflow_dispatch:
    inputs:
      scan_phase:
        description: "Scan phase to run"
        required: false
        default: "manual"
        type: choice
        options:
          - manual
          - pre_market
          - open_confirm
          - intraday
          - post_close
          - evening_plan
  schedule:
    # GitHub cron is UTC. Egypt is UTC+3 for this production schedule.
    # Each cron maps to one product phase; no loose time gate is used.
    - cron: "45 5 * * 0-4"   # 08:45 Cairo - pre-market risk/news check
    - cron: "15 6 * * 0-4"   # 09:15 Cairo - open preparation
    - cron: "0 8 * * 0-4"    # 11:00 Cairo - delayed liquidity confirmation
    - cron: "30 12 * * 0-4"  # 15:30 Cairo - post-close review
    - cron: "30 16 * * 0-4"  # 19:30 Cairo - tomorrow plan

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-oss-120b:free' }}
      OPENROUTER_FALLBACK_MODELS: ${{ vars.OPENROUTER_FALLBACK_MODELS || 'deepseek/deepseek-v4-flash:free,nvidia/nemotron-3-super-120b-a12b:free' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SEND_TELEGRAM: "true"
      USE_GEMINI_GROUNDING: "true"
      USE_OPENROUTER_NARRATIVE: "true"
      USE_AI_DECISION: "false"
      MAX_PRICE_AGE_DAYS: "5"
      EVIDENCE_TOP_N: "8"
      REQUIRE_FLOW_FOR_BUY: "false"
      PYTHONUNBUFFERED: "1"
      INPUT_SCAN_PHASE: ${{ github.event.inputs.scan_phase || '' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Resolve scan phase
        id: scan_phase
        shell: python
        run: |
          import json
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          phase = os.environ.get("INPUT_SCAN_PHASE", "").strip()
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              phase = phase or "manual"
              reason = f"manual workflow_dispatch phase={phase}"
          else:
              with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as event_file:
                  event = json.load(event_file)
              schedule = event.get("schedule", "")
              phase_map = {
                  "45 5 * * 0-4": "pre_market",
                  "15 6 * * 0-4": "open_confirm",
                  "0 8 * * 0-4": "intraday",
                  "30 12 * * 0-4": "post_close",
                  "30 16 * * 0-4": "evening_plan",
              }
              phase = phase_map.get(schedule, "daily")
              now = datetime.now(ZoneInfo("Africa/Cairo"))
              reason = f"scheduled cron={schedule or 'unknown'} mapped to {phase}; Cairo now {now:%Y-%m-%d %H:%M}"
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"SCAN_PHASE={phase}\n")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"phase={phase}\n")
              output.write(f"reason={reason}\n")
          print(reason)

      - name: Run Telegram scanner
        run: python trading_bot_core.py

      - name: Commit scanner outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          files=(
            daily_report.md
            provider_status.md
            automation_status.md
            action_tickets.csv
            trade_history.csv
            market_prices.csv
            indicators.csv
            sector_scores.csv
            scan_results.csv
            data_quality.csv
            watchlist_signals.csv
            watchlist.csv
          )
          for file in "${files[@]}"; do
            if [ -e "$file" ]; then
              git add "$file"
            fi
          done
          git diff --cached --quiet || git commit -m "Update automated scanner outputs"
          git push
