name: EGX Telegram Scanner

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. These map to 09:15, 12:00, and 15:30 Cairo when Cairo is UTC+3.
    - cron: "15 6 * * 0-4"
    - cron: "0 9 * * 0-4"
    - cron: "30 12 * * 0-4"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'openai/gpt-oss-120b:free' }}
      OPENROUTER_FALLBACK_MODELS: ${{ vars.OPENROUTER_FALLBACK_MODELS || 'deepseek/deepseek-v4-flash:free,nvidia/nemotron-3-super-120b-a12b:free,z-ai/glm-4.5-air:free,arcee-ai/trinity-large-thinking:free,google/gemma-4-31b-it:free' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SEND_TELEGRAM: "true"
      USE_GEMINI_GROUNDING: "true"
      USE_OPENROUTER_NARRATIVE: "true"
      USE_AI_DECISION: "false"
      MAX_PRICE_AGE_DAYS: "5"
      EVIDENCE_TOP_N: "3"
      REQUIRE_FLOW_FOR_BUY: "false"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Telegram scanner
        run: python trading_bot_core.py
